<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4de;
    --border2: #d4cfc8;
    --accent: #1a1a2e;
    --accent2: #16A34A;
    --accent3: #07C983;
    --text: #1a1a2e;
    --muted: #6b6675;
    --tag-bg: #e8f8ef;
    --success: #2d7a4f;
    --success-bg: #edfaf3;
    --multi-bg: #fef9ec;
    --multi-border: #f5d97a;
    --multi-text: #7a5a00;
    --radius: 14px;
  }

  :root.dark {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2a2a38;
    --border2: #3a3a4a;
    --accent: #e8e8f8;
    --accent2: #16A34A;
    --accent3: #15803D;
    --text: #e8e8f8;
    --muted: #8080a0;
    --tag-bg: #0e2018;
    --success: #4ade80;
    --success-bg: #0f2a1a;
    --multi-bg: #1e1a0a;
    --multi-border: #5a4a10;
    --multi-text: #c8a840;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px 40px; transition: background 0.2s, color 0.2s; }

  /* Day / Night toggle */
  .theme-toggle { position: fixed; top: 16px; right: 16px; z-index: 999; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .theme-toggle:hover { border-color: var(--accent3); color: var(--accent3); transform: scale(1.08); }

  .quiz-wrap { width: 100%; max-width: 580px; }

  .quiz-header { text-align: center; margin-bottom: 32px; }
  .quiz-eyebrow { display: inline-flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent3); letter-spacing: 1px; text-transform: uppercase; background: var(--tag-bg); padding: 5px 12px; border-radius: 20px; margin-bottom: 14px; }
  .quiz-title { font-family: 'Inter', sans-serif; font-size: clamp(22px, 5vw, 32px); font-weight: 700; line-height: 1.2; letter-spacing: -0.5px; color: var(--text); margin-bottom: 10px; }
  .quiz-subtitle { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 420px; margin: 0 auto; }

  .progress-bar-wrap { margin-bottom: 28px; }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 500; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent3)); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: 0 2px 12px rgba(26,26,46,0.06), 0 1px 3px rgba(26,26,46,0.04); transition: background 0.2s, border-color 0.2s; }
  .quiz-card.animate-in { animation: cardIn 0.3s cubic-bezier(0.4,0,0.2,1); }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .question-num { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }
  .question-text { font-family: 'Inter', sans-serif; font-size: clamp(17px, 4vw, 22px); font-weight: 600; line-height: 1.35; color: var(--text); margin-bottom: 20px; }

  .multi-hint { display: inline-flex; align-items: center; gap: 6px; background: var(--multi-bg); border: 1px solid var(--multi-border); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: 'Inter', sans-serif; color: var(--multi-text); font-weight: 500; margin-bottom: 20px; }

  .answers-grid { display: flex; flex-direction: column; gap: 10px; }

  /* Grid layout when images present */
  .answers-grid.has-images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .answer-btn { width: 100%; text-align: left; padding: 14px 18px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 12px; }
  .answer-btn:hover { border-color: var(--accent3); transform: translateX(3px); }
  .answers-grid.has-images .answer-btn { flex-direction: column; align-items: flex-start; padding: 0; gap: 0; transform: none; overflow: hidden; }
  .answers-grid.has-images .answer-btn:hover { border-color: var(--accent3); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .ans-img-wrap { width: 100%; height: 130px; background: var(--border2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .ans-img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .ans-img-label { padding: 10px 14px; display: flex; align-items: center; gap: 8px; width: 100%; }
  .answer-indicator { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; color: var(--muted); flex-shrink: 0; transition: all 0.18s; }
  .answer-btn:hover .answer-indicator { border-color: var(--accent3); color: var(--accent3); }

  .multi-answers-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .multi-answers-grid.has-images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .multi-answer-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.18s; user-select: none; }
  .multi-answer-item:hover { border-color: var(--accent3); }
  .multi-answer-item.checked { border-color: var(--accent2); background: var(--tag-bg); }
  .multi-answers-grid.has-images .multi-answer-item { flex-direction: column; align-items: flex-start; padding: 0; gap: 0; overflow: hidden; }
  .multi-answers-grid.has-images .multi-answer-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .multi-img-label { padding: 10px 14px; display: flex; align-items: center; gap: 8px; width: 100%; }
  .multi-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border2); background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; color: white; font-size: 11px; font-weight: 700; }
  .multi-answer-item.checked .multi-checkbox { background: var(--accent2); border-color: var(--accent2); }
  .multi-answer-item:hover .multi-checkbox { border-color: var(--accent3); }
  .multi-answer-label { font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; color: var(--text); }
  .multi-answer-item.checked .multi-answer-label { color: var(--accent2); }

  .multi-next-btn { width: 100%; padding: 14px; background: var(--accent2); color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .multi-next-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .multi-next-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .count-badge { background: rgba(255,255,255,0.22); border-radius: 12px; padding: 2px 8px; font-size: 12px; }

  .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; padding: 8px 0; margin-top: 20px; transition: color 0.15s; }
  .back-btn:hover { color: var(--text); }

  .result-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--success-bg); color: var(--success); border: 1px solid rgba(45,122,79,0.2); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
  .result-img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
  .result-title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.3px; }
  .result-subtitle { font-size: 13px; font-weight: 600; color: var(--accent3); margin-bottom: 14px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .result-description { font-size: 14px; font-family: 'Inter', sans-serif; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .cta-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--accent2); color: white; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.18s; }
  .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .cta-btn.secondary { background: none; color: var(--accent2); border: 1.5px solid var(--accent2); }
  .cta-btn.secondary:hover { background: var(--accent2); color: white; }
  .restart-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; background: none; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s; }
  .restart-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Flag notes on result */
  .flag-notes { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .flag-note { display: flex; align-items: flex-start; gap: 10px; background: var(--multi-bg); border: 1px solid var(--multi-border); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--multi-text); line-height: 1.5; }
  .flag-note-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  :root.dark .flag-note { background: var(--multi-bg); border-color: var(--multi-border); }

  .error-box { background: #fff5f5; border: 1px solid #fecaca; border-radius: 10px; padding: 20px; font-size: 13px; font-family: 'Inter', sans-serif; color: #991b1b; line-height: 1.6; }
  .error-box code { font-family: 'Inter', monospace; font-size: 11px; background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 3px; }
</style>
</head>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  END OF QUIZ DATA — do not edit below this line unless you know what you're doing
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let history = [];
let currentId = null;
let totalSteps = 0;
let multiSelected = new Set();
let activeFlags = new Set(); // accumulates flag tags as user answers

function startQuiz() {
  history = [];
  currentId = QUIZ_DATA.startId;
  multiSelected = new Set();
  activeFlags = new Set();
  totalSteps = estimateSteps();
  goTo(currentId);
}

function estimateSteps() {
  const visited = new Set();
  const queue = [QUIZ_DATA.startId];
  let depth = 0;
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id); depth++;
    const q = findQuestion(id);
    if (q) q.answers.forEach(a => { if (a.next) queue.push(a.next); });
  }
  return Math.max(depth, 3);
}

function goTo(id) {
  currentId = id;
  multiSelected = new Set();
  const question = findQuestion(id);
  const result = findResult(id);
  if (question) {
    if (question.multiSelect) renderMultiQuestion(question);
    else renderSingleQuestion(question);
  } else if (result) {
    renderResult(result);
  } else {
    showError(`Node "${id}" not found. Re-export your quiz from the builder and paste the updated JSON above.`);
  }
}

function goBack() {
  if (!history.length) return;
  currentId = history.pop();
  goTo(currentId);
}

// ─── SINGLE SELECT ────────────────────────────────────────────────────────────
function renderSingleQuestion(q) {
  const step = history.length + 1;
  const pct = Math.min(100, Math.round((history.length / totalSteps) * 100));
  const indicators = 'ABCDEFGHIJKL';
  const hasImages = q.answers.some(a => a.image);

  const answersHTML = q.answers.map((a, i) => {
    if (hasImages) {
      return `
        <button class="answer-btn" data-ans-index="${i}" onclick="pickSingleByIndex(${i})">
          <div class="ans-img-wrap">
            ${a.image ? `<img class="ans-img" src="${a.image}" alt="${a.label}">` : `<span style="font-size:11px;color:var(--muted)">No image</span>`}
          </div>
          <div class="ans-img-label">
            <div class="answer-indicator">${indicators[i]}</div>
            <span>${a.label}</span>
          </div>
        </button>`;
    }
    return `
      <button class="answer-btn" data-ans-index="${i}" onclick="pickSingleByIndex(${i})">
        <div class="answer-indicator">${indicators[i]}</div>
        <span>${a.label}</span>
      </button>`;
  }).join('');

  document.getElementById('quizRoot').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-info"><span>Step ${step}</span><span>${pct}% complete</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-card animate-in">
      <div class="question-num">Question ${step}</div>
      <div class="question-text">${q.text}</div>
      <div class="answers-grid${hasImages ? ' has-images' : ''}">${answersHTML}</div>
      ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← Back</button>` : ''}
    </div>`;
}

function pickSingleByIndex(idx) {
  const q = findQuestion(currentId);
  if (!q) return;
  const a = q.answers[idx];
  if (!a || !a.next) return;
  if (a.flags) a.flags.forEach(f => activeFlags.add(f));
  history.push(currentId);
  goTo(a.next);
}

// ─── MULTI SELECT ─────────────────────────────────────────────────────────────
function renderMultiQuestion(q, animate = true) {
  const step = history.length + 1;
  const pct = Math.min(100, Math.round((history.length / totalSteps) * 100));
  const count = multiSelected.size;
  const hasImages = q.answers.some(a => a.image);

  const itemsHTML = q.answers.map((a, i) => {
    const checked = multiSelected.has(i);
    if (hasImages) {
      return `
        <div class="multi-answer-item${checked ? ' checked' : ''}" onclick="toggleMulti(${i})">
          <div class="ans-img-wrap">
            ${a.image ? `<img class="ans-img" src="${a.image}" alt="${a.label}">` : `<span style="font-size:11px;color:var(--muted)">No image</span>`}
          </div>
          <div class="multi-img-label">
            <div class="multi-checkbox">${checked ? '✓' : ''}</div>
            <span class="multi-answer-label">${a.label}</span>
          </div>
        </div>`;
    }
    return `
      <div class="multi-answer-item${checked ? ' checked' : ''}" onclick="toggleMulti(${i})">
        <div class="multi-checkbox">${checked ? '✓' : ''}</div>
        <span class="multi-answer-label">${a.label}</span>
      </div>`;
  }).join('');

  document.getElementById('quizRoot').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-info"><span>Step ${step}</span><span>${pct}% complete</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-card${animate ? ' animate-in' : ''}">
      <div class="question-num">Question ${step}</div>
      <div class="question-text">${q.text}</div>
      <div class="multi-hint">☑ Select all that apply, then click Next</div>
      <div class="multi-answers-grid${hasImages ? ' has-images' : ''}" id="multiGrid">${itemsHTML}</div>
      <button class="multi-next-btn" id="multiNextBtn" onclick="submitMulti()" ${count === 0 ? 'disabled' : ''}>
        Next →
        ${count > 0 ? `<span class="count-badge">${count} selected</span>` : ''}
      </button>
      ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← Back</button>` : ''}
    </div>`;
}

function toggleMulti(idx) {
  if (multiSelected.has(idx)) multiSelected.delete(idx);
  else multiSelected.add(idx);

  const grid = document.getElementById('multiGrid');
  if (grid) {
    grid.querySelectorAll('.multi-answer-item').forEach((el, i) => {
      const checked = multiSelected.has(i);
      el.classList.toggle('checked', checked);
      const box = el.querySelector('.multi-checkbox');
      if (box) box.textContent = checked ? '✓' : '';
    });
  }
  const btn = document.getElementById('multiNextBtn');
  if (btn) {
    const count = multiSelected.size;
    btn.disabled = count === 0;
    btn.innerHTML = `Next → ${count > 0 ? `<span class="count-badge">${count} selected</span>` : ''}`;
  }
}

function submitMulti() {
  if (multiSelected.size === 0) return;
  const q = findQuestion(currentId);
  const selectedSorted = [...multiSelected].map(String).sort();

  // Collect flags from all selected answers
  selectedSorted.forEach(idx => {
    const ans = q.answers[parseInt(idx)];
    if (ans && ans.flags) ans.flags.forEach(f => activeFlags.add(f));
  });

  // Find matching combo rule
  const matchingRules = (q.comboRules || []).filter(rule => {
    const mode = rule.mode || 'exact';
    const ruleIds = [...rule.selectedIds].sort();
    if (mode === 'exact') {
      return ruleIds.length === selectedSorted.length && ruleIds.every(id => selectedSorted.includes(id));
    } else {
      return ruleIds.every(id => selectedSorted.includes(id));
    }
  }).filter(r => r.next);

  matchingRules.sort((a, b) => b.selectedIds.length - a.selectedIds.length);
  let matched = matchingRules[0]?.next || null;
  if (!matched && q.fallback) matched = q.fallback;

  if (!matched) {
    showError(`No matching rule for this combination and no fallback is set on question "${q.id}". Open the builder and add a fallback.`);
    return;
  }

  history.push(currentId);
  goTo(matched);
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult(r) {
  const imgHTML = r.image ? `<img class="result-img" src="${r.image}" alt="${r.title}">` : '';
  const subtitleHTML = r.subtitle ? `<div class="result-subtitle">${r.subtitle}</div>` : '';
  const descHTML = r.description ? `<div class="result-description">${r.description}</div>` : '';

  // CTAs: support ctas array (new format) and legacy link field
  let ctasHTML = '';
  let ctas = [];
  if (r.ctas && r.ctas.length) {
    ctas = r.ctas;
  } else if (r.link) {
    ctas = [{ label: 'View Product →', url: r.link, style: 'primary' }];
  }
  ctas.forEach((cta) => {
    if (!cta.url) return; // skip empty URLs
    const cls = cta.style === 'secondary' ? 'cta-btn secondary' : 'cta-btn';
    ctasHTML += `<a class="${cls}" href="${cta.url}" target="_blank">${cta.label || 'Learn More'}</a>`;
  });

  // Flag notes: look up any flag notes defined on this result that match active flags
  let flagNotesHTML = '';
  if (r.flagNotes && activeFlags.size > 0) {
    const matchedNotes = r.flagNotes.filter(fn => activeFlags.has(fn.flag));
    if (matchedNotes.length) {
      flagNotesHTML = `<div class="flag-notes">${
        matchedNotes.map(fn => `
          <div class="flag-note">
            <span class="flag-note-icon">${fn.icon || '⚠️'}</span>
            <span>${fn.note}</span>
          </div>`).join('')
      }</div>`;
    }
  }

  document.getElementById('quizRoot').innerHTML = `
    <div class="quiz-card animate-in">
      <div class="result-badge">✓ Our Recommendation</div>
      ${imgHTML}
      <div class="result-title">${r.title}</div>
      ${subtitleHTML}${descHTML}
      ${flagNotesHTML}
      <div class="divider"></div>
      <div class="result-actions">
        ${ctasHTML}
        <button class="restart-btn" onclick="startQuiz()">↺ Start over</button>
      </div>
    </div>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function findQuestion(id) { return QUIZ_DATA.questions?.find(q => q.id === id) || null; }
function findResult(id)   { return QUIZ_DATA.results?.find(r => r.id === id) || null; }

function showError(msg) {
  document.getElementById('quizRoot').innerHTML = `
    <div class="error-box">
      <strong>Quiz error</strong><br><br>${msg}
    </div>`;
}

// ─── THEME TOGGLE ─────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('quizTheme', isDark ? 'dark' : 'light');
}

// Restore saved theme preference
(function() {
  const saved = localStorage.getItem('quizTheme');
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

// ─── START ────────────────────────────────────────────────────────────────────
startQuiz();

</script>
